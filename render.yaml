services:
  - type: web
    name: puzzlenest
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: puzzlenest-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SITE_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_ID_MONTHLY
        sync: false

databases:
  - name: puzzlenest-db
    plan: free
    databaseName: puzzlenest
    user: puzzlenest
