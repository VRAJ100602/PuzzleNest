<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- 5x5 grid -->
  <rect x="4" y="4" width="40" height="40" fill="none" stroke="#0f0e0c" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="12" y1="4" x2="12" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="20" y1="4" x2="20" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="28" y1="4" x2="28" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="36" y1="4" x2="36" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="4" y1="12" x2="44" y2="12" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="4" y1="20" x2="44" y2="20" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="4" y1="28" x2="44" y2="28" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="4" y1="36" x2="44" y2="36" stroke="#0f0e0c" stroke-width=".8"/>
  <!-- Black cells (classic crossword pattern) -->
  <rect x="4" y="4" width="8" height="8" fill="#0f0e0c"/>
  <rect x="28" y="4" width="8" height="8" fill="#0f0e0c"/>
  <rect x="20" y="20" width="8" height="8" fill="#0f0e0c"/>
  <rect x="4" y="36" width="8" height="8" fill="#0f0e0c"/>
  <rect x="36" y="36" width="8" height="8" fill="#0f0e0c"/>
  <!-- Gold accent cell -->
  <rect x="12" y="12" width="8" height="8" fill="#c8961e" opacity=".25"/>
  <!-- Tiny clue numbers -->
  <text x="13.5" y="10" font-family="sans-serif" font-size="5" fill="#0f0e0c" font-weight="600">1</text>
  <text x="37.5" y="10" font-family="sans-serif" font-size="5" fill="#0f0e0c" font-weight="600">2</text>
  <text x="5.5" y="18" font-family="sans-serif" font-size="5" fill="#0f0e0c" font-weight="600">3</text>
  <text x="13.5" y="18" font-family="sans-serif" font-size="5" fill="#c8961e" font-weight="700">4</text>
</svg>
