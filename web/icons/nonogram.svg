<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Column clues area (top) -->
  <text x="12" y="9" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#0f0e0c" text-anchor="middle">2</text>
  <text x="20" y="9" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#0f0e0c" text-anchor="middle">3</text>
  <text x="28" y="9" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#0f0e0c" text-anchor="middle">1</text>
  <text x="36" y="9" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#c8961e" text-anchor="middle">4</text>
  <!-- Row clues area (left) -->
  <text x="6" y="18" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#0f0e0c" text-anchor="middle">3</text>
  <text x="6" y="26" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#c8961e" text-anchor="middle">2</text>
  <text x="6" y="34" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#0f0e0c" text-anchor="middle">1</text>
  <text x="6" y="42" font-family="Georgia,serif" font-size="6" font-weight="700" fill="#0f0e0c" text-anchor="middle">4</text>
  <!-- 4x4 grid with shaded cells forming a pattern -->
  <rect x="8" y="12" width="32" height="32" fill="none" stroke="#0f0e0c" stroke-width="1.5"/>
  <line x1="16" y1="12" x2="16" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="24" y1="12" x2="24" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="32" y1="12" x2="32" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="8" y1="20" x2="40" y2="20" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="8" y1="28" x2="40" y2="28" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="8" y1="36" x2="40" y2="36" stroke="#0f0e0c" stroke-width=".8"/>
  <!-- Filled cells -->
  <rect x="8" y="12" width="8" height="8" fill="#0f0e0c"/>
  <rect x="16" y="12" width="8" height="8" fill="#0f0e0c"/>
  <rect x="24" y="12" width="8" height="8" fill="#0f0e0c"/>
  <rect x="32" y="20" width="8" height="8" fill="#c8961e"/>
  <rect x="24" y="20" width="8" height="8" fill="#c8961e"/>
  <rect x="16" y="28" width="8" height="8" fill="#0f0e0c"/>
  <rect x="8" y="36" width="8" height="8" fill="#0f0e0c"/>
  <rect x="16" y="36" width="8" height="8" fill="#0f0e0c"/>
  <rect x="24" y="36" width="8" height="8" fill="#0f0e0c"/>
  <rect x="32" y="36" width="8" height="8" fill="#0f0e0c"/>
</svg>
