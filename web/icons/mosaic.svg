<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- 4x4 grid frame -->
  <rect x="4" y="4" width="40" height="40" fill="none" stroke="#0f0e0c" stroke-width="2"/>
  <line x1="14" y1="4" x2="14" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="24" y1="4" x2="24" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="34" y1="4" x2="34" y2="44" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="4" y1="14" x2="44" y2="14" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="4" y1="24" x2="44" y2="24" stroke="#0f0e0c" stroke-width=".8"/>
  <line x1="4" y1="34" x2="44" y2="34" stroke="#0f0e0c" stroke-width=".8"/>
  <!-- Filled cells (mosaic pattern) -->
  <rect x="4" y="4" width="10" height="10" fill="#0f0e0c" opacity=".12"/>
  <rect x="14" y="4" width="10" height="10" fill="#0f0e0c" opacity=".12"/>
  <rect x="14" y="14" width="10" height="10" fill="#0f0e0c" opacity=".12"/>
  <rect x="24" y="14" width="10" height="10" fill="#c8961e" opacity=".2"/>
  <rect x="24" y="24" width="10" height="10" fill="#0f0e0c" opacity=".12"/>
  <rect x="34" y="24" width="10" height="10" fill="#0f0e0c" opacity=".12"/>
  <rect x="34" y="34" width="10" height="10" fill="#0f0e0c" opacity=".12"/>
  <!-- Number clues -->
  <text x="9" y="12" font-family="sans-serif" font-size="7" font-weight="600" fill="#0f0e0c" text-anchor="middle">3</text>
  <text x="19" y="12" font-family="sans-serif" font-size="7" font-weight="600" fill="#0f0e0c" text-anchor="middle">5</text>
  <text x="29" y="22" font-family="sans-serif" font-size="7" font-weight="700" fill="#c8961e" text-anchor="middle">4</text>
  <text x="39" y="32" font-family="sans-serif" font-size="7" font-weight="600" fill="#0f0e0c" text-anchor="middle">2</text>
  <text x="19" y="22" font-family="sans-serif" font-size="7" font-weight="600" fill="#0f0e0c" text-anchor="middle">6</text>
</svg>
