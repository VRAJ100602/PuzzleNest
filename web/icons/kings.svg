<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Mini chessboard background (4x4) -->
  <g opacity=".08">
    <rect x="6" y="6" width="9" height="9" fill="#0f0e0c"/>
    <rect x="24" y="6" width="9" height="9" fill="#0f0e0c"/>
    <rect x="15" y="15" width="9" height="9" fill="#0f0e0c"/>
    <rect x="33" y="15" width="9" height="9" fill="#0f0e0c"/>
    <rect x="6" y="24" width="9" height="9" fill="#0f0e0c"/>
    <rect x="24" y="24" width="9" height="9" fill="#0f0e0c"/>
    <rect x="15" y="33" width="9" height="9" fill="#0f0e0c"/>
    <rect x="33" y="33" width="9" height="9" fill="#0f0e0c"/>
  </g>
  <!-- Board border -->
  <rect x="6" y="6" width="36" height="36" fill="none" stroke="#0f0e0c" stroke-width="1" opacity=".15"/>
  <!-- Crown (simplified king piece) -->
  <path d="M14 36 L14 28 L10 22 L18 26 L24 18 L30 26 L38 22 L34 28 L34 36 Z" fill="none" stroke="#c8961e" stroke-width="2" stroke-linejoin="miter"/>
  <path d="M14 36 L14 28 L10 22 L18 26 L24 18 L30 26 L38 22 L34 28 L34 36 Z" fill="#c8961e" opacity=".12"/>
  <!-- Base -->
  <line x1="12" y1="36" x2="36" y2="36" stroke="#c8961e" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Cross on top -->
  <line x1="24" y1="14" x2="24" y2="18" stroke="#c8961e" stroke-width="1.5"/>
  <line x1="22" y1="16" x2="26" y2="16" stroke="#c8961e" stroke-width="1.5"/>
  <!-- Non-attack zone indicators (diagonal lines) -->
  <line x1="8" y1="8" x2="14" y2="14" stroke="#c04a2a" stroke-width=".8" opacity=".3" stroke-dasharray="2 2"/>
  <line x1="34" y1="8" x2="40" y2="14" stroke="#c04a2a" stroke-width=".8" opacity=".3" stroke-dasharray="2 2"/>
</svg>
